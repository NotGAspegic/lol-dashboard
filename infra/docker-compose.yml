x-backend-image: &backend-image
  build:
    context: ../backend
    dockerfile: Dockerfile
  image: lol_backend:dev

services:

  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: lol_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: lol_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  flower:
    <<: *backend-image
    container_name: lol_flower
    restart: unless-stopped
    working_dir: /backend
    volumes:
      - ../backend:/backend
    env_file:
      - ../backend/.env
    environment:
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
    depends_on:
      - redis
      - worker
    ports:
      - "5555:5555"
    command:
      [
        "celery",
        "-A",
        "worker.celery_app",
        "flower",
        "--port=5555",
        "--basic_auth=${FLOWER_USER}:${FLOWER_PASSWORD}"
      ]

  adminer:
    image: adminer:latest
    container_name: lol_adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  api:
    <<: *backend-image
    container_name: lol_api
    restart: unless-stopped
    working_dir: /backend
    volumes:
      - ../backend:/backend
    env_file:
      - ../backend/.env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://loluser:lolpassword@postgres:5432/loldb}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      FRONTEND_ORIGIN: "http://localhost:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000", "--reload", "--log-level", "debug"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    ports:
      - "8000:8000"

  worker:
    <<: *backend-image
    container_name: lol_worker
    restart: unless-stopped
    working_dir: /backend
    volumes:
      - ../backend:/backend
    env_file:
      - ../backend/.env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://loluser:lolpassword@postgres:5432/loldb}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    command: ["celery", "-A", "worker.celery_app", "worker", "-Q", "ingestion", "--loglevel=debug", "--concurrency=4"]
    healthcheck:
      test: ["CMD-SHELL", "celery -A worker.celery_app inspect ping -d celery@$$HOSTNAME"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  priority_worker:
    <<: *backend-image
    container_name: lol_priority_worker
    restart: unless-stopped
    working_dir: /backend
    volumes:
      - ../backend:/backend
    env_file:
      - ../backend/.env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://loluser:lolpassword@postgres:5432/loldb}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    command: ["celery", "-A", "worker.celery_app", "worker", "-Q", "refresh,priority_ingestion", "--loglevel=debug", "--concurrency=2"]
    healthcheck:
      test: ["CMD-SHELL", "celery -A worker.celery_app inspect ping -d celery@$$HOSTNAME"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  beat:
    <<: *backend-image
    container_name: lol_beat
    restart: unless-stopped
    working_dir: /backend
    volumes:
      - ../backend:/backend
    env_file:
      - ../backend/.env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://loluser:lolpassword@postgres:5432/loldb}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    command: ["celery", "-A", "worker.celery_app", "beat", "--loglevel=info", "--schedule=/tmp/celerybeat-schedule"]
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/celerybeat-schedule && kill -0 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  pgdata:
  redis_data:
