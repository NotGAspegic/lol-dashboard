[mypy]
python_version = 3.11
ignore_missing_imports = True
explicit_package_bases = True
exclude = ^backend/(\.venv|venv)/|^backend/alembic/versions/

[mypy-api.v1]
ignore_errors = True

[mypy-config]
ignore_errors = True

[mypy-db.ops]
ignore_errors = True

[mypy-db.ops_sync]
ignore_errors = True

[mypy-ingestion.pipeline]
ignore_errors = True

[mypy-ml.features.draft_features]
ignore_errors = True

[mypy-riot.client]
ignore_errors = True

[mypy-test_riot_api]
ignore_errors = True

[mypy-worker.tasks.ingest]
ignore_errors = True
